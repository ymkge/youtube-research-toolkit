name: Daily YouTube Stats Collector

on:
  schedule:
    # 毎日日本時間午前3時 (UTC 18:00) に自動実行
    - cron: '0 18 * * *'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み（Push）権限を付与して exit code 128 を回避
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch and Export Daily Stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MONITOR_CHANNELS: ${{ secrets.MONITOR_CHANNELS }}
        run: |
          python backend/app/scripts/fetch_stats.py --json

      - name: Commit and Push History Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/history/
          # 差分がある場合のみコミット・プッシュを実行
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily YouTube stats [skip ci]" && git push)
